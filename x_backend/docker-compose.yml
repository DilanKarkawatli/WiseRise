version: '3.9'

services:
  api:
    build: .
    container_name: my-api
    ports: 
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/mydb
    restart: always
  db: 
    image: postgres:15
    container_name: my-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
  
volumes: 
  postgres_data: